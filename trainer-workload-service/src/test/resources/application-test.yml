spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  jms:
    listener:
      auto-startup: false
  activemq:
    broker-url: vm://localhost?broker.persistent=false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

jwt:
