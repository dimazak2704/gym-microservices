services:

  # ===== MySQL для gym-crm =====
  mysql:
    image: mysql:8.0
    container_name: gym-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: gym_crm
      MYSQL_USER: gymuser
      MYSQL_PASSWORD: gympass
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - gym-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== MongoDB trainer-workload-service =====
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - gym-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== ActiveMQ (message broker) =====
  activemq:
    image: apache/activemq-classic:5.18.3
    container_name: activemq
    ports:
      - "61616:61616"
      - "8161:8161"
    environment:
      ACTIVEMQ_CONNECTION_USER: admin
      ACTIVEMQ_CONNECTION_PASSWORD: admin
    volumes:
      - activemq-data:/opt/apache-activemq/data
    networks:
      - gym-network
    healthcheck:
      test: [ "CMD-SHELL", "/opt/apache-activemq/bin/activemq status" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Eureka Server =====
  eureka-server:
    build:
      context: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - gym-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Trainer Workload Service =====
  trainer-workload-service:
    build:
      context: ./trainer-workload-service
    container_name: trainer-workload-service
    ports:
      - "8081:8081"
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka/
      JWT_SECRET: a9f8e7d6c5b4a3f2e1d0c9b8a7f6e5d4c3b2a1f0e9d8c7b6a5f4e3d2c1b0a9f8
      SPRING_PROFILES_ACTIVE: docker
      ACTIVEMQ_BROKER_URL: tcp://activemq:61616
      MONGODB_URI: mongodb://mongodb:27017/workloaddb
    depends_on:
      eureka-server:
        condition: service_healthy
      activemq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - gym-network

  # ===== Gym CRM (моноліт) =====
  gym-crm:
    build:
      context: ./GymCRM
    container_name: gym-crm
    ports:
      - "8080:8080"
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka/
      JWT_SECRET: a9f8e7d6c5b4a3f2e1d0c9b8a7f6e5d4c3b2a1f0e9d8c7b6a5f4e3d2c1b0a9f8
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gym_crm
      SPRING_DATASOURCE_USERNAME: gymuser
      SPRING_DATASOURCE_PASSWORD: gympass
      SPRING_PROFILES_ACTIVE: docker
      ACTIVEMQ_BROKER_URL: tcp://activemq:61616
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      activemq:
        condition: service_healthy
    networks:
      - gym-network

# Спільна мережа для всіх контейнерів
networks:
  gym-network:
    driver: bridge

# Volume для збереження даних
volumes:
  mysql-data:
  activemq-data:
  mongo-data: