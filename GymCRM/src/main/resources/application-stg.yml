spring:
  datasource:
    url: jdbc:mysql://stg-db-host:3306/gym_crm_stg?useSSL=true&serverTimezone=UTC
    username: stg_user
    password: stg_password

  jpa:
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    enabled: false