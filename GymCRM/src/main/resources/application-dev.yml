spring:
  datasource:
    url: jdbc:mysql://dev-db-host:3306/gym_crm_dev?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: dev_user
    password: dev_password

  jpa:
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    enabled: true